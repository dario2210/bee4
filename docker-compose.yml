version: "3.8"

services:
  bee4-bot:
    build:
      context: /home/darek/apps/infra/bee4
      dockerfile: Dockerfile
    image: bee4-bot:latest
    container_name: bee4_bot
    restart: unless-stopped
    ports:
      - "127.0.0.1:8064:8064"
    volumes:
      - /home/darek/apps/infra/bee4:/app
    environment:
      - TZ=Europe/Warsaw
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8064')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
